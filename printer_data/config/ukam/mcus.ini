# This file stores the flash_commands for each mcus
# Previous version KCONFIG_CONFIG was needed now it is automaticly added when make flash is called
# version : 0.1
# tested/supported flash methods :
#  - make flash
#  - sdcard_flash
#  - flashtool.py
#  - mount/cp/umount (for rp2040)
 
[bttpi]
klipper_section: mcu CB1
action_command: make flash 

[skrpico]
klipper_section: mcu
action_command: make flash FLASH_DEVICE=/dev/serial/by-id/usb-Klipper_rp2040_4547415054052B4A-if00

[ebb36]
klipper_section: mcu EBB36
config_name: ebb36
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -i can0 -u a72977c534a8

